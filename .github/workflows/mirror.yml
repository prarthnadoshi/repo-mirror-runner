name: repo-mirror
on:
  workflow_dispatch:
  schedule:
    - cron: '7 */6 * * *'
concurrency:
  group: repo-mirror
  cancel-in-progress: false
jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Backup scripts (encrypted -> GitHub + Drive, same as RDP1)
        env:
          BPASS: ${{ secrets.BPASS }}
          BPAT: ${{ secrets.BPAT }}
          GID: ${{ secrets.GID }}
          GSEC: ${{ secrets.GSEC }}
          GREF: ${{ secrets.GREF }}
          GFOLDER: ${{ secrets.GFOLDER }}
        run: node backup_scripts.js || true
      - name: Run mirror worker (15 parallel, ~5.5h then hand off)
        env:
          SB_HOST: ${{ secrets.SB_HOST }}
          SB_PORT: ${{ secrets.SB_PORT }}
          SB_DB: ${{ secrets.SB_DB }}
          SB_USER: ${{ secrets.SB_USER }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
          MIRROR_PARALLEL: "15"
          GIT_TERMINAL_PROMPT: "0"
        run: |
          npm install pg --no-audit --no-fund
          timeout 330m node mirror_worker.js || true
      - name: Re-dispatch self (continuous - no gap)
        if: always()
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.DISPATCH_PAT }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/prarthnadoshi/repo-mirror-runner/actions/workflows/mirror.yml/dispatches -d '{"ref":"main"}'
          echo "next run dispatched"
